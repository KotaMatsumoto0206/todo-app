<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <meta name="description" content="Todo-app">

    <!-- 1. 外部リソース（Google Fontsなど） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <!-- 2. ライブラリ・リセット用CSS（土台） -->
    <link rel="stylesheet" href="./assets/css/sanitize.css">

    <!-- 3. メインのCSS（自分のこだわり） -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <script src="./assets/js/app.js" defer></script>
</head>

<body>

    <main class="todo-container">
        <h1 class="todo-header">Todo list</h1>

        <div class="todo-input-group">
            <label for="todo-input" class="sr-only">新しいタスクを追加</label>
            <input type="text" id="todo-input" placeholder="新しいタスクを入力...">
            <button class="add-button" type="button">追加</button>
        </div>

        <ul class="todo-list"></ul>
    </main>
    
</body>

</html>
